<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms & Stays | Courtallam Holidays by Tourver</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">
        <div style="display: flex; align-items: center;"><img src="images/logo.png" alt="Logo" style="height: 80px; margin-right: 12px; margin-top: -10px; margin-bottom: -10px;"><div style="display: inline-flex; flex-direction: column; line-height: 1;"><span style="font-size: 1.5rem; font-weight: 700; color: inherit; white-space: nowrap;">Courtallam Holidays</span><span style="font-size: 0.75rem; font-weight: 600; letter-spacing: 3px; color: var(--accent); margin-top: 2px; white-space: nowrap;">BY TOURVER</span></div></div>
      </a>
      <button class="mobile-toggle"><i data-lucide="menu"></i></button>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="packages.html" class="nav-link">Packages</a>
        <a href="rooms.html" class="nav-link">Rooms</a>
        <a href="transport.html" class="nav-link">Transport</a>
        <a href="about.html" class="nav-link">About Us</a>
        <a href="contact.html" class="btn btn-primary">Enquiry Now</a>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="section section-dark text-center" style="padding: var(--spacing-2xl) 0;">
    <div class="container fade-in">
      <h1>Rooms & Stays</h1>
      <p style="max-width: 600px; margin: 0 auto;">Comfortable, clean, and nature-inspired rooms for every budget.</p>
    </div>
  </header>

  <!-- Content Section -->
  <section class="section section-light">
    <div class="container">
      
      <!-- Filters & Sorting Header -->
      <div class="room-controls-header fade-in">
        <div class="tabs-nav" style="margin-bottom: 0;">
          <button class="tab-btn active" data-target="all">All Rooms</button>
          <button class="tab-btn" data-target="budget">Budget</button>
          <button class="tab-btn" data-target="standard">Standard AC</button>
          <button class="tab-btn" data-target="deluxe">Deluxe</button>
          <button class="tab-btn" data-target="family">Family</button>
          <button class="tab-btn" data-target="cottages">Cottages</button>
        </div>
        
        <div class="sorting-controls">
          <span id="room-count">0 Rooms Found</span>
          <select id="room-sort" class="form-select-premium">
            <option value="default">Sort By: Recommended</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="availability">Availability</option>
          </select>
        </div>
      </div>

      <!-- Search Banner -->
      <div id="search-banner" style="display: none; background: rgba(56, 161, 105, 0.1); padding: 1.5rem; border-radius: var(--radius-md); border-left: 4px solid var(--primary); margin-bottom: 2rem;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <div>
            <h3 style="margin-bottom: 0.25rem; color: var(--primary-dark);">Suggested Rooms</h3>
            <p style="margin: 0; color: var(--text);" id="search-banner-text"></p>
          </div>
          <a href="rooms.html" class="btn btn-outline" style="background: white;">Clear Search</a>
        </div>
      </div>

      <!-- Rooms Grid -->
      <div class="grid grid-cols-3" id="rooms-container">
        <!-- Rendered via JS -->
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container text-center">
      <p style="color: var(--text-light);">&copy; 2026 Courtallam Holidays by Tourver. All rights reserved. </p>
    </div>
  </footer>

  <script src="js/prices.js?v=6"></script>
  <script src="js/data.js?v=6"></script>
  <script src="js/main.js?v=6"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      
      const container = document.getElementById('rooms-container');
      const tabs = document.querySelectorAll('.tab-btn');
      
      const urlParams = new URLSearchParams(window.location.search);
      const checkin = urlParams.get('checkin');
      const checkout = urlParams.get('checkout');
      const persons = urlParams.get('persons');
      const children = urlParams.get('children') || 0;
      const roomsCount = urlParams.get('roomsCount');

      if (checkin && checkout && persons && roomsCount) {
        document.getElementById('search-banner').style.display = 'block';
        document.getElementById('search-banner-text').textContent = `Showing best rooms for ${persons} Adults${children > 0 ? ` and ${children} Children` : ''} in ${roomsCount} Room(s).`;
      }

      function calculateSmartScore(room, p, c, childrenCount) {
        if (!room.available) return 0;
        
        // 1. Feature Extraction: Determine target capacity per room
        const totalPersons = parseInt(p) + parseInt(childrenCount || 0);
        const targetPerRoom = Math.ceil(totalPersons / c);
        
        // 2. Data Parsing: Extract actual capacity from room details
        let actualCapacity = 2; // Baseline assumption
        if (room.capacity) {
          // NLP-style extraction: Find all numbers in the capacity string (e.g. "2 Adults, 1 Child" -> [2, 1])
          const numbers = room.capacity.match(/\d+/g);
          if (numbers) {
            actualCapacity = numbers.reduce((sum, num) => sum + parseInt(num), 0);
          }
        } else {
          // Fallback heuristic based on category
          if (room.category === 'family' || room.category === 'cottages') actualCapacity = 4;
          else if (room.category === 'deluxe') actualCapacity = 3;
        }

        // 3. Loss Function: Calculate Mean Absolute Error (MAE)
        const diff = Math.abs(targetPerRoom - actualCapacity);
        
        // 4. Model Scoring: Convert error to confidence percentage
        let score = 0;
        if (diff === 0) score = 95 + Math.floor(Math.random() * 5); // Exact Match: 95-99%
        else if (diff === 1) score = 80 + Math.floor(Math.random() * 10); // Close Match: 80-89%
        else if (diff === 2) score = 60 + Math.floor(Math.random() * 10); // Weak Match: 60-69%
        else score = 40; // Poor Match

        // 5. Weight Adjustment: Penalize heavily if the room is too small
        if (actualCapacity < targetPerRoom) {
            score -= 20; 
        }

        return Math.max(10, score);
      }

      // Sorting functionality
      const sortSelect = document.getElementById('room-sort');
      const sortParam = urlParams.get('sort');
      if (sortParam) {
        sortSelect.value = sortParam;
      }

      function updateRoomCount(count) {
        document.getElementById('room-count').textContent = `${count} Room${count !== 1 ? 's' : ''} Found`;
      }

      function applySort(rooms, sortType) {
        switch (sortType) {
          case 'price_asc':
            return rooms.sort((a, b) => {
              const priceA = getCurrentPrice(a).price;
              const priceB = getCurrentPrice(b).price;
              return priceA - priceB;
            });
          case 'price_desc':
            return rooms.sort((a, b) => {
              const priceA = getCurrentPrice(a).price;
              const priceB = getCurrentPrice(b).price;
              return priceB - priceA;
            });
          case 'availability':
            return rooms.sort((a, b) => {
              if (a.available === b.available) return 0;
              return a.available ? -1 : 1;
            });
          case 'default':
          default:
            // Keep default ordering or matchScore ordering
            return rooms;
        }
      }

      // Shimmer loader HTML
      const shimmerCard = `
        <div class="card fade-in" style="pointer-events: none;">
          <div class="card-img-wrapper skeleton" style="height: 250px;"></div>
          <div class="card-body">
            <div class="skeleton skeleton-text" style="width: 70%; height: 24px; margin-bottom: 1rem;"></div>
            <div class="skeleton skeleton-text" style="width: 40%; height: 16px; margin-bottom: 1rem;"></div>
            <div class="skeleton skeleton-text" style="width: 100%; height: 60px; margin-bottom: 1rem;"></div>
            <div class="skeleton skeleton-text" style="width: 100%; height: 40px; margin-top: auto;"></div>
          </div>
        </div>
      `;

      async function renderRooms(filter = 'all') {
        const sortType = sortSelect.value;
        
        // Show shimmer loader
        container.innerHTML = shimmerCard.repeat(6);
        updateRoomCount(0);
        
        try {
          // Small delay for smooth animation perception
          await new Promise(resolve => setTimeout(resolve, 400));
          
          let fetchUrl = '/api/rooms?t=' + Date.now();
          if (checkin && checkout) {
            fetchUrl += `&checkin=${checkin}&checkout=${checkout}`;
          }
          const response = await fetch(fetchUrl);
          const dbRooms = await response.json();
          const rooms = dbRooms.length > 0 ? dbRooms : appData.rooms;
          
          container.innerHTML = '';
          let filtered = filter === 'all' 
            ? rooms 
            : rooms.filter(r => r.category === filter);
            
          if (checkin && checkout && persons && roomsCount && filter === 'all') {
            filtered.forEach(r => r.matchScore = calculateSmartScore(r, parseInt(persons), parseInt(roomsCount), children));
            // Only show matched rooms (score >= 60)
            const matched = filtered.filter(r => r.matchScore >= 60);
            if (matched.length > 0) {
              filtered = matched.sort((a, b) => (b.matchScore || 0) - (a.matchScore || 0));
            } else {
              // No good matches — show all rooms silently, sorted by score
              filtered.sort((a, b) => (b.matchScore || 0) - (a.matchScore || 0));
            }
          }
          
          filtered = applySort(filtered, sortType);
          updateRoomCount(filtered.length);
          
          if (filtered.length === 0) {
            container.innerHTML = `
              <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem;">
                <i data-lucide="search-x" style="width: 64px; height: 64px; color: var(--text-light); margin-bottom: 1rem;"></i>
                <h3 style="color: var(--primary-dark);">No Rooms Found</h3>
                <p style="color: var(--text-light);">Try adjusting your filters or search criteria.</p>
                <button class="btn btn-outline mt-3" onclick="window.location.href='rooms.html'">Clear All Filters</button>
              </div>
            `;
            lucide.createIcons();
            return;
          }

          container.innerHTML = filtered.map(createRoomCard).join('');
          lucide.createIcons();
          
          const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                obs.unobserve(entry.target);
              }
            });
          });
          document.querySelectorAll('#rooms-container .fade-in').forEach(el => observer.observe(el));
        } catch (error) {
          console.error("Fetch failed, using static data", error);
          const rooms = appData.rooms || [];
          let filtered = filter === 'all' ? rooms : rooms.filter(r => r.category === filter);
          
          if (checkin && checkout && persons && roomsCount && filter === 'all') {
            filtered.forEach(r => r.matchScore = calculateSmartScore(r, parseInt(persons), parseInt(roomsCount), children));
            const matched = filtered.filter(r => r.matchScore >= 60);
            if (matched.length > 0) {
              filtered = matched.sort((a, b) => (b.matchScore || 0) - (a.matchScore || 0));
            } else {
              filtered.sort((a, b) => (b.matchScore || 0) - (a.matchScore || 0));
            }
          }
          
          filtered = applySort(filtered, sortType);
          updateRoomCount(filtered.length);
          container.innerHTML = filtered.map(createRoomCard).join('');
          lucide.createIcons();
        }
      }

      renderRooms();

      // Update URL silently
      function updateUrlParam(key, value) {
        const url = new URL(window.location);
        if (value && value !== 'all' && value !== 'default') {
          url.searchParams.set(key, value);
        } else {
          url.searchParams.delete(key);
        }
        window.history.replaceState({}, '', url);
      }

      // Restore category from URL or default to 'all'
      const categoryParam = urlParams.get('category') || 'all';
      if (categoryParam !== 'all') {
        const activeTab = document.querySelector(`.tab-btn[data-target="${categoryParam}"]`);
        if (activeTab) {
          tabs.forEach(t => t.classList.remove('active'));
          activeTab.classList.add('active');
        }
        renderRooms(categoryParam);
      }

      sortSelect.addEventListener('change', (e) => {
        updateUrlParam('sort', e.target.value);
        const activeFilter = document.querySelector('.tab-btn.active').dataset.target;
        renderRooms(activeFilter);
      });

      tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
          tabs.forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          const filterTarget = e.target.dataset.target;
          updateUrlParam('category', filterTarget);
          renderRooms(filterTarget);
        });
      });
    });
  </script>
</body>
</html>
